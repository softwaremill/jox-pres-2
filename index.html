						## Akka streams

						```java [|6|7|1-2,8-10|11|3-4,12|13|14]
						var delayed =
						  CompletableFuture.delayedExecutor(5L, TimeUnit.SECONDS);
						var nats =
						  Source.unfold(0, i -> Optional.of(Pair.create(i+1, i+1)));

						Source.range(1, 100)
						  .throttle(1, Duration.ofSeconds(1))
						  .mapAsync(4, i -> CompletableFuture
						    .supplyAsync(() -> i * 3, delayed)
						    .thenApplyAsync(k -> k + 1))
						  .filter(i -> i % 2 == 0)
						  .zip(nats)
						  .runForeach(System.out::println, system)
						  .toCompletableFuture();
						```

						> Virtual threads are lightweight threads that reduce the effort of writing,
						maintaining, and debugging high-throughput concurrent applications.

						from [Oracle's website](https://docs.oracle.com/en/java/javase/21/core/virtual-threads.html)

						* Java used to have a synchronous model
						* but, the web happened

						## In the old days

						```java
						var person = db.findById(id);

						if (person.hasLicense()) {

						## More recently

						```java
						db.findById(id).thenCompose(person -> {

						## Stages & emits

						```java
						public interface FlowStage<T> {
							void run(FlowEmit<T> emit) throws Exception;
						}

						public interface FlowEmit<T> {
							void apply(T t) throws Exception;
						}
						```

						---

						## Top-level flow

						```java
						public class Flow<T> {
							final FlowStage<T> last;
							// ...
						}
						```

						---

						## Example infinite stream

						```java[|2-3|5|6-10]
						public class Flows {
							public static <T> Flow<T> iterate(T zero,
															  Function<T, T> nextFn) {

								return new Flow(emit -> {
									T current = zero;
									while (true) {
										emit.apply(current);
										current = nextFn.apply(current);
									}
								});
							}
						}
						```

						---

						## Example consumer

						```java
						public class Flow<T> {
							// ...

							public List<T> runToList() throws Exception {
								List<T> result = new ArrayList<>();
								last.run(result::add);
								return result;
							}
						}
						```

						---

						## Example transformation

						```java[|7|8|9]
						public class Flow<T> {
							// ...

							public <U> Flow<U> map(
								ThrowingFunction<T, U> mappingFunction) {

								return new Flow<>(emit -> {
									last.run(t ->
										emit.apply(mappingFunction.apply(t)));
								});
							}
						}
						```

						## Managing threads

						* using structured concurrency
						* built on top of [JEP-499](https://openjdk.org/jeps/499)
						  * in preview

						---

						```java[|1|3,8|13]
						var result = supervised(scope -> {

							var f1 = scope.fork(() -> {
								Thread.sleep(500);
								return 5;
							});

							var f2 = scope.fork(() -> {
								Thread.sleep(1000);
								return 6;
							});

							return f1.join() + f2.join();
						});
						```

						---

						```java[|5|14]
						var result = supervised(scope -> {

							var f1 = scope.fork(() -> {
								Thread.sleep(500);
								throw new RuntimeException("Giving up!");
							});

							var f2 = scope.fork(() -> {
								Thread.sleep(1000);
								return 6;
							});

							return f1.join() + f2.join();
						});
						```

						## Let it crash!

						---

						```java[|6,14]
						var result = supervised(scope -> {
							var result = new CompletableFuture<String>();

							var f1 = scope.fork(() -> {
								Thread.sleep(500);
								result.complete("Number 1 won!");
							});

							var f2 = scope.fork(() -> {
								Thread.sleep(1000);
								result.complete("Number 2 won!");
							});

							return result.get();
						});

						## Structured concurrency

						Syntactical structure of the code determines the lifetime of threads

						Threading becomes an implementation detail!

						```java
						public Flow<T> merge(Flow<T> other) {
						  return new Flow<>(emit -> {
							  supervised(scope -> {
							    Channel<T> c1 = this.runToChannel(scope);
								Channel<T> c2 = other.runToChannel(scope);

								boolean continueLoop = true;
								while (continueLoop) {
								  switch (selectOrClosed(c1.receiveClause(),
														 c2.receiveClause())) {
									case ChannelDone _ -> continueLoop = false;
									case ChannelError e -> throw e.toException();
									case Object r -> emit.apply((T) r);
						        }
						}); }); } }
						```

						## Jox Flows

						```java [|4|6|7-9|1-2,12|13]
						var nats =
						  Flows.unfold(0, i -> Optional.of(Map.entry(i+1, i+1)));

						Flows.range(1, 100, 1)
						  .throttle(1, Duration.ofSeconds(1))
						  .mapPar(4, i -> {
							Thread.sleep(5000);
							var j = i*3;
							return j+1;
						  })
						  .filter(i -> i % 2 == 0)
						  .zip(nats)
						  .runForeach(System.out::println);
						```

						## Error handling?

						* sync: just throw exceptions
						  * `try-catch-finally`
						  * `.onError`, `.onComplete` for convenience
						* async: structured concurrency
						<!-- .element: class="fragment" -->
						  * threading == implementation detail

						```java [|2,5|4,7-9]
						public void runToChannel(UnsupervisedScope scope) {
						  var channel = Channel.newBufferedChannel(bufferCapacity);
						  scope.forkUnsupervised(() -> {
						    try {
						      last.run(channel::send);
						      channel.done();
						    } catch (Throwable e) {
						      channel.error(e);
						    }
						    return null;
						  });
						}
